name: Weekly grant digest

on:
  schedule:
    # Every Monday at 06:00 UTC (07:00 Tunis time UTC+1)
    - cron: "0 6 * * 1"
  workflow_dispatch:        # allow manual trigger from the Actions tab

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run agent pipeline
        env:
          MISTRAL_API_KEY:      ${{ secrets.MISTRAL_API_KEY }}
          MISTRAL_MODEL:        mistral-small-latest
          TAVILY_API_KEY:       ${{ secrets.TAVILY_API_KEY }}
          SMTP_HOST:            smtp.gmail.com
          SMTP_PORT:            "587"
          SMTP_USER:            ${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD:    ${{ secrets.SMTP_APP_PASSWORD }}
          EMAIL_FROM_NAME:      Agent Arc En Ciel
          EMAIL_TO:             ${{ secrets.EMAIL_TO }}
          TWILIO_ACCOUNT_SID:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:    ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          WHATSAPP_TO:          ${{ secrets.WHATSAPP_TO }}
          DB_PATH:              data/grants.db
        run: python -m src.main

      - name: Persist grants DB as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grants-db-${{ github.run_id }}
          path: data/grants.db
          if-no-files-found: ignore
          retention-days: 30
